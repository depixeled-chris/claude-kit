# .ai/config.yml — the brain of the workflow.
#
# The router and the drain read THIS file. Adding a classification, a
# priority, a status, or changing how something is routed is a one-file
# edit here. No code change, no CLAUDE.md edit — the contract in
# CLAUDE.md points at this file, so behavior changes when this changes.
#
# This is the single source of truth for the taxonomy.

# ---------------------------------------------------------------------------
# CLASSIFICATIONS
# When you interject, the input is classified into one of these and routed
# to `routes_to`. Add your own freely (spike, chore, security, idea, ...).
#
#   routes_to:    tickets | backlog | questions | notes | decisions | active-ticket
#   priority:     default priority assigned at capture (see `priorities`)
#   blocking:     never | always | when-touching-active | when-caused-by-active
#                 (when-touching-active  = block only if it concerns the file/area I'm in now)
#                 (when-caused-by-active = block only if it's a regression from my current change)
#   link:         optional — extra link the router should attach (e.g. causing-commit)
#   answerable_by: for questions — who can resolve it [claude, chris]
# ---------------------------------------------------------------------------
classifications:
  bug:          { routes_to: tickets,       priority: high,     blocking: when-touching-active }
  regression:   { routes_to: tickets,       priority: critical, blocking: when-caused-by-active, link: causing-commit }
  feature:      { routes_to: backlog,       priority: medium,   blocking: never }
  tech-debt:    { routes_to: backlog,       priority: low,      blocking: never }
  question:     { routes_to: questions,     blocking: never,    answerable_by: [claude, chris] }
  observation:  { routes_to: notes,         blocking: never }
  decision:     { routes_to: decisions,     blocking: never }
  scope-change: { routes_to: active-ticket, blocking: always }

# ---------------------------------------------------------------------------
# PRIORITIES — highest first. Redefine to taste.
# ---------------------------------------------------------------------------
priorities: [critical, high, medium, low]

# ---------------------------------------------------------------------------
# STATUSES — the lifecycle a ticket moves through.
# Swap for your own vocabulary, e.g. [backlog, next, doing, blocked, shipped].
# `human_only` statuses are ones Claude must NOT set itself.
# ---------------------------------------------------------------------------
statuses:
  flow: [todo, doing, review, done]
  # EMPTY here: claude-kit runs `uat: none` (KIT-D034) — the maintainer delegated
  # acceptance ("you are more informed than I am on this particular project to do the
  # UAT"). The project TEMPLATE keeps human_only: [done].
  human_only: []
  # `superseded` is OFF-FLOW: a newer ticket retired this one (set `superseded_by:` here +
  # `supersedes:` on the replacement). It drops out of the active board + drain (KIT-T024).
  off_board: [superseded]

# ---------------------------------------------------------------------------
# UAT — who ACCEPTS finished work (KIT-D034). `review` is the UAT stage (KIT-D033).
#   default: required — finished work parks in `review`; only the human sets `done`.
#            none     — Claude closes work directly (review -> skipped) once every
#                       acceptance criterion passes WITH test evidence; the evidence
#                       floor (KIT-T061) applies at the closing transition either way.
#   Per-ticket override: frontmatter `uat: required|none` beats the project default.
# ---------------------------------------------------------------------------
uat:
  default: none   # this repo: acceptance delegated to the agent (KIT-D034)

# ---------------------------------------------------------------------------
# DRAIN — how the queue empties without Chris driving it.
# ---------------------------------------------------------------------------
drain:
  # When idle / between tickets, pull work in this type order (then by priority).
  order: [regression, bug, feature, tech-debt]
  # Respect ROADMAP.md milestone order when a current milestone exists;
  # fall back to `order` + priority when it doesn't.
  follow_roadmap: true
  # How bold Claude is when it picks up the next item unprompted:
  #   within-patterns-low-risk = do it if it follows established patterns and is low-risk;
  #                              otherwise surface a one-line "next up, your call".
  #   surface-only             = never start a new ticket without an explicit go.
  auto_execute: within-patterns-low-risk
  # Questions Claude can answer from code/decisions are answered + logged inline.
  # Questions needing Chris are surfaced BATCHED at natural breaks, not as interruptions.
  answer_self_questions: true
  # Unattended backlog grooming (dedupe INBOX, link regressions, propose worklist).
  # off | loop | cron  — opt-in; costs tokens / needs the machine on.
  groomer: off

# ---------------------------------------------------------------------------
# DISPATCH — the FIREPOWER a ticket gets when it is delegated to a subagent
# (KIT-D022 complexity principle; KIT-T034). Model and reasoning-effort are ONE
# decision, not two knobs: pick a `tier`, get both. The orchestrator reads THIS
# block at delegation time and passes the resolved model + effort as the Agent
# `model`/`effort` params — no code honors it, the orchestrator does (so the
# field needs no parser; see commands/drain.md + commands/work.md).
#
# RESOLUTION ORDER (first hit wins), per ticket:
#   1. explicit `model:` / `effort:` on the ticket  → use verbatim (per-axis override)
#   2. explicit `tier:` on the ticket               → expand via `tiers` below
#   3. no field                                     → `default_tier` for the ticket's
#                                                      type (then the catch-all `*`)
# `model:`/`effort:` override INDIVIDUALLY: a ticket may set `tier: deep` but pin
# `model: sonnet` to get deep effort on the cheaper model.
#
# DISTINCT from KIT-T078 (static `model:` on fixed-cost read-only COMMANDS): that
# lever tiers a command whose cost is intrinsic; THIS tiers the per-ticket work a
# command dispatches. Same principle, different granularity — they don't overlap.
# ---------------------------------------------------------------------------
dispatch:
  # tier -> the (model, effort) firepower it expands to. Three tiers span the
  # KIT-D022 ladder: light = mechanical, standard = everyday atomic change,
  # deep = reasoning-heavy planning/architecture/research.
  #   effort values (verified to exist as Agent/command/skill frontmatter):
  #   low | medium | high | xhigh | max
  tiers:
    light:    { model: haiku,  effort: low }     # data formatting, mechanical edits, search, triage
    standard: { model: sonnet, effort: medium }  # normal atomic code change / bug fix (the everyday default)
    deep:     { model: opus,   effort: high }     # planning, architecture, research, epics, anything reasoning-heavy
  # Default tier by ticket `type` when the ticket names no tier/model. Keys are
  # classification types (config.classifications); `*` is the catch-all. Projects
  # that add their own types (epic, research, architecture, chore, format, cleanup,
  # spike, security) map them here — e.g. research/architecture/epic -> deep,
  # chore/format/cleanup -> light.
  default_tier:
    regression: standard
    bug:        standard
    feature:    standard
    tech-debt:  light
    "*":        standard

# ---------------------------------------------------------------------------
# RECEIPTS — how routing is acknowledged so you can catch a misroute fast.
#   one-line = "→ BUG-024 logged, still on T-001"   | silent = no ack, check the board
# ---------------------------------------------------------------------------
receipts: one-line

# ---------------------------------------------------------------------------
# CAPTURE RATCHET — the Stop-time gate (hooks/request-gate.mjs) that makes request
# capture structural instead of memory-dependent. Requests have no choke point like
# `git commit`, so the gate manufactures one at the end of every assistant turn: if
# the last user message looks like an actionable request and nothing was captured
# this turn, it blocks the stop ONCE (loop-proof via stop_hook_active).
#   enabled: true|false   — turn the gate off per project.
#   mode:    block-once    — rigid: block the stop once (recommended).
#            warn          — soft: stderr only, never block.
#   release: a routing receipt ("→ KIT-T005 filed" / "… logged") OR a
#            "[no-capture: reason]" note in the reply OR any new/changed file in an
#            .ai capture store this turn satisfies the gate.
#   signals: case-insensitive regexes; these OVERRIDE the built-in default set.
# ---------------------------------------------------------------------------
capture:
  enabled: true
  mode: block-once
  signals:
    - "i'?d like"
    - "can you (add|make|build|create|write|set ?up)"
    - "could you (add|make|build|create)"
    - "we should"
    - "you should (add|make|build)"
    - "in the future"
    - "eventually"
    - "don'?t forget"
    - "it would be (nice|good|great)"
    - "let'?s\\b.*\\blater\\b"
    - "remember to"
    - "at some point"
    - "would be (nice|good|worth)"

# ---------------------------------------------------------------------------
# IDS — scheme is <KEY>-<TYPE><NUM>, so an id reads in a cross-project rundown.
#   key   = the project key (prefixes every id; HOD, KIT, ...)
#   type  = the store letter: ticket=T, decision=D, note=N, question=Q
#   num   = zero-padded counter
# e.g. KIT-T001 (ticket), KIT-D010 (decision). `prefix` is the ticket prefix.
# ---------------------------------------------------------------------------
ids:
  key: "KIT"
  prefix: "KIT-T"
  pad: 3            # KIT-T001, KIT-T002, ...

# ---------------------------------------------------------------------------
# NATIVE TASK SYNC — the native Claude Code task list is a LIVE projection of
# the tickets here (DECISIONS D-005). Ticket = durable truth; native = ephemeral,
# per-session view. Claude is the only writer, so it keeps both in lockstep.
# ---------------------------------------------------------------------------
native_task_sync:
  enabled: true
  # Prefix each kit-managed native task's subject with its ticket id ("T-001 ..."),
  # so ticket-backed tasks are visibly distinct from ad-hoc ones.
  prefix_with_ticket_id: true
  # An orphan (unprefixed) native task is work living only in the ephemeral list.
  # Persist it here before re-tagging the native task:  inbox | ticket
  promote_orphans_to: inbox
  # ticket status -> native task status (native has no review/human-gate state)
  status_map:
    todo: pending
    doing: in_progress
    review: completed
    done: completed

# ---------------------------------------------------------------------------
# HISTORY & REGRESSIONS (DECISIONS D-006). Every ticket carries an append-only
# ## History audit log; bugs link recurrences so regressions are tracked. Markdown
# only — INDEX.md / REGRESSIONS.md are GENERATED reference files, not the truth.
# ---------------------------------------------------------------------------
history:
  # event vocabulary for "- [YYYY-MM-DD HH:MM] (event) detail" lines in ## History
  events: [created, status, comment, decision, blocker, unblocked, fixed, regressed]
  # done tickets move here (relative to .ai/) so the active board stays small
  archive_done_to: tickets/archive
regressions:
  # frontmatter links on a recurrence ticket (type: regression)
  links: [regressed_from, causing_commit, fixed_commit]
  index_file: REGRESSIONS.md       # generated chains: original -> recurrences
  board_file: tickets/INDEX.md     # generated ticket board (id/type/status/title)
