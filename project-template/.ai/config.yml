# .ai/config.yml — the brain of the workflow.
#
# The router and the drain read THIS file. Adding a classification, a
# priority, a status, or changing how something is routed is a one-file
# edit here. No code change, no CLAUDE.md edit — the contract in
# CLAUDE.md points at this file, so behavior changes when this changes.
#
# This is the single source of truth for the taxonomy.
#
# INTENTIONAL DIVERGENCES from the claude-kit repo config (KIT-T069):
#   uat.default: required  (template default) vs none (repo: maintainer-delegated, KIT-D034)
#   ids.key: placeholder   (template — init-project replaces with the real project key)
#                          vs KIT (repo's hardcoded key)

# ---------------------------------------------------------------------------
# CLASSIFICATIONS
# When you interject, the input is classified into one of these and routed
# to `routes_to`. Add your own freely (spike, chore, security, idea, ...).
#
#   routes_to:    tickets | backlog | questions | notes | decisions | active-ticket
#   priority:     default priority assigned at capture (see `priorities`)
#   blocking:     never | always | when-touching-active | when-caused-by-active
#                 (when-touching-active  = block only if it concerns the file/area I'm in now)
#                 (when-caused-by-active = block only if it's a regression from my current change)
#   link:         optional — extra link the router should attach (e.g. causing-commit)
#   answerable_by: for questions — who can resolve it [claude, chris]
# ---------------------------------------------------------------------------
classifications:
  bug:          { routes_to: tickets,       priority: high,     blocking: when-touching-active }
  regression:   { routes_to: tickets,       priority: critical, blocking: when-caused-by-active, link: causing-commit }
  feature:      { routes_to: backlog,       priority: medium,   blocking: never }
  tech-debt:    { routes_to: backlog,       priority: low,      blocking: never }
  question:     { routes_to: questions,     blocking: never,    answerable_by: [claude, chris] }
  observation:  { routes_to: notes,         blocking: never }
  decision:     { routes_to: decisions,     blocking: never }
  request:      { routes_to: requests,      priority: medium,  blocking: never }
  epic:         { routes_to: epics,         priority: medium,  blocking: never }
  reminder:     { routes_to: reminders,     blocking: never }
  scope-change: { routes_to: active-ticket, blocking: always }

# ---------------------------------------------------------------------------
# PRIORITIES — highest first. Redefine to taste.
# ---------------------------------------------------------------------------
priorities: [critical, high, medium, low]

# ---------------------------------------------------------------------------
# STATUSES — the lifecycle a ticket moves through.
# Swap for your own vocabulary, e.g. [backlog, next, doing, blocked, shipped].
# `human_only` statuses are ones Claude must NOT set itself.
# ---------------------------------------------------------------------------
statuses:
  flow: [todo, doing, review, done]
  human_only: [done]        # Claude moves to review; only Chris marks done.
  # `superseded` is OFF-FLOW: a newer ticket retired this one (set `superseded_by:` here +
  # `supersedes:` on the replacement). Drops out of the active board + drain (KIT-T024).
  off_board: [superseded]

# ---------------------------------------------------------------------------
# UAT — who ACCEPTS finished work (KIT-D034). `review` is the UAT stage.
#   default: required — finished work parks in `review`; only the human sets `done`
#                       (pair with human_only: [done] above).
#            none     — Claude closes work directly once every acceptance criterion
#                       passes WITH test evidence (pair with human_only: []).
#   Per-ticket override: frontmatter `uat: required|none` beats the project default.
# ---------------------------------------------------------------------------
uat:
  default: required

# ---------------------------------------------------------------------------
# DRAIN — how the queue empties without Chris driving it.
# ---------------------------------------------------------------------------
drain:
  # When idle / between tickets, pull work in this type order (then by priority).
  order: [regression, bug, feature, tech-debt]
  # Respect ROADMAP.md milestone order when a current milestone exists;
  # fall back to `order` + priority when it doesn't.
  follow_roadmap: true
  # How bold Claude is when it picks up the next item unprompted:
  #   within-patterns-low-risk = do it if it follows established patterns and is low-risk;
  #                              otherwise surface a one-line "next up, your call".
  #   surface-only             = never start a new ticket without an explicit go.
  auto_execute: within-patterns-low-risk
  # Questions Claude can answer from code/decisions are answered + logged inline.
  # Questions needing Chris are surfaced BATCHED at natural breaks, not as interruptions.
  answer_self_questions: true
  # NOTE: drain.groomer knob removed (KIT-D030 — no config vapor: no implementation yet).

# ---------------------------------------------------------------------------
# RECEIPTS — how routing is acknowledged so you can catch a misroute fast.
#   one-line = "→ BUG-024 logged, still on T-001"   | silent = no ack, check the board
# ---------------------------------------------------------------------------
receipts: one-line

# ---------------------------------------------------------------------------
# CAPTURE RATCHET — the Stop-time gate (hooks/request-gate.mjs) that makes request
# capture structural instead of memory-dependent. Requests have no choke point like
# `git commit`, so the gate manufactures one at the end of every assistant turn: if
# the last user message looks like an actionable request and nothing was captured
# this turn, it blocks the stop ONCE (loop-proof via stop_hook_active).
#   enabled: true|false   — turn the gate off per project.
#   mode:    block-once    — rigid: block the stop once (recommended).
#            warn          — soft: stderr only, never block.
#   release: a routing receipt ("→ KIT-T005 filed" / "… logged") OR a
#            "[no-capture: reason]" note in the reply OR any new/changed file in an
#            .ai capture store this turn satisfies the gate.
#   signals: case-insensitive regexes; these OVERRIDE the built-in default set.
# ---------------------------------------------------------------------------
capture:
  enabled: true
  mode: block-once
  signals:
    - "i'?d like"
    - "can you (add|make|build|create|write|set ?up)"
    - "could you (add|make|build|create)"
    - "we should"
    - "you should (add|make|build)"
    - "in the future"
    - "eventually"
    - "don'?t forget"
    - "it would be (nice|good|great)"
    - "let'?s\\b.*\\blater\\b"
    - "remember to"
    - "at some point"
    - "would be (nice|good|worth)"

# ---------------------------------------------------------------------------
# DISPATCH — the FIREPOWER a ticket gets when delegated to a subagent (KIT-D035).
# Resolution order (first hit wins): explicit ticket model:/effort: → ticket tier:
# expanded via tiers → default_tier for the ticket's type (then * catch-all).
# ---------------------------------------------------------------------------
dispatch:
  tiers:
    light:    { model: haiku,  effort: low }
    standard: { model: sonnet, effort: medium }
    deep:     { model: opus,   effort: high }
  default_tier:
    regression: standard
    bug:        standard
    feature:    standard
    tech-debt:  light
    request:    standard
    epic:       deep
    "*":        standard

# ---------------------------------------------------------------------------
# IDS — scheme is <KEY>-<TYPE><NUM> (KIT-D011). key = project key (HOD, KIT, ...),
# type = store letter (ticket=T, decision=D, note=N, question=Q), num = padded counter.
# init-project sets `key` + `prefix` from the project (KIT-T002); until then, edit them here.
# ---------------------------------------------------------------------------
ids:
  key: "KEY"
  prefix: "KEY-T"
  pad: 3            # KEY-T001, KEY-T002, ...

# ---------------------------------------------------------------------------
# ROADMAP — generated | narrative.  generated = thin sequence assembled from ticket
# frontmatter (milestone + priority) by scripts/index-tickets.mjs; narrative = a
# hand-curated prose ROADMAP the generator leaves alone. (D-009)
# ---------------------------------------------------------------------------
roadmap_mode: generated

# ---------------------------------------------------------------------------
# NATIVE TASK SYNC (D-005) — native task list is a live projection of tickets/.
# Slimmed to what the code reads (KIT-D030): sync-tasks.mjs reads `status_map`
# only; the behavioral contract (prefix, orphan promotion) is in CLAUDE.md.
# ---------------------------------------------------------------------------
native_task_sync:
  enabled: true
  status_map:
    todo: pending
    doing: in_progress
    review: completed
    done: completed

# ---------------------------------------------------------------------------
# HISTORY & REGRESSIONS (D-006) — every ticket has an append-only ## History;
# bugs link recurrences. INDEX/REGRESSIONS/ROADMAP are GENERATED, never hand-kept.
# ---------------------------------------------------------------------------
history:
  events: [created, status, comment, decision, blocker, unblocked, fixed, regressed]
  archive_done_to: tickets/archive
regressions:
  links: [regressed_from, causing_commit, fixed_commit]
  index_file: REGRESSIONS.md
  board_file: tickets/INDEX.md

# ---------------------------------------------------------------------------
# WATCH_REPOS — extra repo paths (relative to the project root) the orient hook
# includes in its resume working-tree survey, e.g. a backport target. Surfaces
# their uncommitted + unpushed state so local-only work elsewhere is never lost.
# ---------------------------------------------------------------------------
watch_repos: []
